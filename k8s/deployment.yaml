apiVersion: apps/v1
kind: Deployment
metadata:
  name: seb-exam-portal
  namespace: seb-exam-portal
  labels:
    app: seb-exam-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: seb-exam-portal
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1 # Allow one extra pod during update
      maxUnavailable: 0 # Ensure zero downtime; wait for new pod to be ready
  template:
    metadata:
      labels:
        app: seb-exam-portal
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000 # Matches the appuser UID in the Dockerfile
        fsGroup: 1000
      containers:
        - name: seb-exam-portal
          image: rodas01/seb-exam-portal:latest # This tag will be dynamically updated by CI
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: seb-portal-config
            - secretRef:
                name: seb-portal-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15 # Time to start up
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
