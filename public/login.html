<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - ASTU</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-left">
        <img
          src="/images/images.png"
          alt="Adama Science and Technology University"
          class="logo-img"
        />
        <div class="header-text">
          <h1>Adama Science and Technology University</h1>
          <div class="sub">
            Exam &bull; SEB Centralized Exam Redirect Manager
          </div>
        </div>
      </div>
      <div class="header-right">
        <span class="version-badge"
          ><i class="fas fa-code-branch"></i> v2.0.0</span
        >
        <span style="font-size: 0.8rem; opacity: 0.6"
          ><i class="fas fa-shield-alt"></i> SEB</span
        >
      </div>
    </header>

    <main class="main-content">
      <div class="container">
        <div class="card login-card">
          <img
            src="/images/images.png"
            alt="ASTU Logo"
            class="logo-placeholder"
          />
          <h2 style="margin-bottom: 5px">Administrator Access</h2>
          <p style="color: var(--text-muted); margin-bottom: 25px">
            Authorized personnel only
          </p>

          <div id="error-msg" class="login-error"></div>

          <form id="loginForm">
            <div class="form-group">
              <label for="username">Username</label>
              <input
                type="text"
                id="username"
                placeholder="Enter username"
                required
                autocomplete="username"
              />
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                placeholder="Enter password"
                required
                autocomplete="current-password"
              />
            </div>
            <button type="submit">Secure Login</button>
          </form>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <div>
        © 2026 Adama Science and Technology University &bull; System
        Administrator <i class="fas fa-lock" style="opacity: 0.6"></i> Secure
        Exam Environment
      </div>
      <div>All rights reserved.</div>
    </footer>

    <script src="login.js"></script>
  </body>
</html>
